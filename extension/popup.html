<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap");

      :root {
        --bg: #0c0c0f;
        --surface: #13131a;
        --border: #1e1e2e;
        --accent: #00d4ff;
        --accent-dim: rgba(0, 212, 255, 0.12);
        --critical: #ff4444;
        --high: #ff8800;
        --medium: #ffcc00;
        --low: #00d4ff;
        --text: #e2e8f0;
        --muted: #4a5568;
        --mono: "IBM Plex Mono", monospace;
        --sans: "IBM Plex Sans", sans-serif;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 380px;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-size: 13px;
      }

      /* ── Header ── */
      .header {
        padding: 16px 18px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logo-icon {
        width: 28px;
        height: 28px;
        background: var(--accent-dim);
        border: 1px solid var(--accent);
        border-radius: 6px;
        display: grid;
        place-items: center;
        font-size: 14px;
      }

      .logo-text {
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.12em;
        color: var(--accent);
        text-transform: uppercase;
      }

      .status-pill {
        font-family: var(--mono);
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 20px;
        border: 1px solid;
        display: flex;
        align-items: center;
        gap: 5px;
        letter-spacing: 0.06em;
      }

      .status-pill.ok {
        color: #00c97a;
        border-color: rgba(0, 201, 122, 0.3);
        background: rgba(0, 201, 122, 0.08);
      }
      .status-pill.scanning {
        color: var(--accent);
        border-color: rgba(0, 212, 255, 0.3);
        background: var(--accent-dim);
      }
      .status-pill.warn {
        color: var(--medium);
        border-color: rgba(255, 204, 0, 0.3);
        background: rgba(255, 204, 0, 0.08);
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Stats Row ── */
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        border-bottom: 1px solid var(--border);
      }

      .stat {
        padding: 14px 0;
        text-align: center;
        border-right: 1px solid var(--border);
      }
      .stat:last-child {
        border-right: none;
      }

      .stat-val {
        font-family: var(--mono);
        font-size: 22px;
        font-weight: 600;
        line-height: 1;
        color: var(--text);
        margin-bottom: 4px;
      }

      .stat-val.has-threat {
        color: var(--critical);
      }
      .stat-label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* ── Actions ── */
      .actions {
        display: flex;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }

      .btn {
        flex: 1;
        padding: 9px 12px;
        border-radius: 6px;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.05em;
        cursor: pointer;
        border: none;
        transition: all 0.15s;
        text-transform: uppercase;
      }

      .btn-primary {
        background: var(--accent);
        color: #000;
      }
      .btn-primary:hover {
        background: #33ddff;
      }
      .btn-primary:disabled {
        background: var(--border);
        color: var(--muted);
        cursor: not-allowed;
      }

      .btn-ghost {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent);
      }
      .btn-ghost:hover {
        background: var(--accent-dim);
      }

      .spinner {
        display: inline-block;
        width: 10px;
        height: 10px;
        border: 2px solid rgba(0, 0, 0, 0.3);
        border-top-color: #000;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin-right: 6px;
        vertical-align: middle;
      }

      /* ── Threat list ── */
      .section-label {
        padding: 10px 14px 6px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .threats {
        max-height: 240px;
        overflow-y: auto;
        padding: 0 14px 14px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .threats::-webkit-scrollbar {
        width: 4px;
      }
      .threats::-webkit-scrollbar-track {
        background: transparent;
      }
      .threats::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .threat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid var(--low);
        border-radius: 6px;
        padding: 9px 11px;
        animation: slideIn 0.2s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .threat-card.critical {
        border-left-color: var(--critical);
      }
      .threat-card.high {
        border-left-color: var(--high);
      }
      .threat-card.medium {
        border-left-color: var(--medium);
      }

      .threat-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 3px;
      }

      .threat-name {
        font-weight: 600;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 220px;
      }

      .threat-badge {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .badge-critical {
        background: rgba(255, 68, 68, 0.2);
        color: var(--critical);
      }
      .badge-high {
        background: rgba(255, 136, 0, 0.2);
        color: var(--high);
      }
      .badge-medium {
        background: rgba(255, 204, 0, 0.18);
        color: var(--medium);
      }
      .badge-low {
        background: var(--accent-dim);
        color: var(--accent);
      }

      .threat-meta {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
      }

      .empty {
        text-align: center;
        padding: 28px 14px;
        color: var(--muted);
      }
      .empty-icon {
        font-size: 28px;
        margin-bottom: 8px;
      }
      .empty-text {
        font-size: 12px;
        color: #2d3748;
      }

      /* ── Footer ── */
      .footer {
        border-top: 1px solid var(--border);
        padding: 8px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .footer-time {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
      }

      .desktop-hint {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        transition: color 0.15s;
      }
      .desktop-hint:hover {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <div class="logo-icon">🛡</div>
        <span class="logo-text">Net Guard</span>
      </div>
      <div class="status-pill ok" id="statusPill">
        <div class="dot"></div>
        <span id="statusText">Защитен</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="scannedCount">—</div>
        <div class="stat-label">Сканирани</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="threatCount">—</div>
        <div class="stat-label">Заплахи</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="criticalCount">—</div>
        <div class="stat-label">Критични</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="scanBtn">Сканирай</button>
      <button class="btn btn-ghost" id="dashboardBtn">Табло</button>
    </div>

    <div class="section-label" id="sectionLabel">Последни заплахи</div>
    <div class="threats" id="threatList"></div>

    <div class="footer">
      <span class="footer-time" id="lastScan">Никога не е сканирано</span>
      <span class="desktop-hint" id="desktopHint" title="Отвори пълното табло"
        >⬡ https://netguard-api.noit.eu</span
      >
    </div>

    <script src="popup.js"></script>
  </body>
</html>
